name: Update CV

on:
  push:
    branches: [main]
    paths:
      - cv_data.yaml
      - scripts/generate_cv.py

  workflow_dispatch:  # also allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (weasyprint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libfontconfig1 \
            libcairo2

      - name: Install Python dependencies
        run: pip install weasyprint pyyaml

      - name: Generate CV.pdf and update README badge
        run: python scripts/generate_cv.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "⚡ Update CV"
          file_pattern: "CV_EN.pdf CV_ES.pdf README.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
